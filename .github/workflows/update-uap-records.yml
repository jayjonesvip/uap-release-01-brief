name: Update UAP Release Records

on:
  workflow_dispatch:
  schedule:
    # Runs every morning at 6:17 AM UTC.
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  update-records:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Refresh records
        run: npm run update-records

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update UAP Release 01 records"
          file_pattern: data/release-01-records.json media/**
